<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Adarsh General Store</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>"/>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="admin-body">

<!-- ════════════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">🛒 Adarsh Admin</div>
    <p class="login-sub">Sign in to manage your store</p>

    <div class="form-group">
      <label for="login-user">Username</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="login-btn">Login →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     ADMIN PANEL  (hidden until logged in)
════════════════════════════════════════════════════ -->
<div id="admin-panel" style="display:none">

  <!-- Navbar -->
  <nav class="admin-nav navbar">
    <div class="nav-inner">
      <div class="nav-logo">⚙️ Adarsh <span>Admin</span></div>
      <div class="admin-nav-links">
        <button class="admin-nav-link active" data-tab="products">📦 Products</button>
        <button class="admin-nav-link" data-tab="categories">🗂 Categories</button>
        <a href="index.html" class="admin-nav-link" target="_blank">🔗 View Store</a>
      </div>
      <button class="admin-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- ── PRODUCTS TAB ────────────────────────────── -->
  <div id="tab-products" class="admin-wrap">

    <!-- LEFT: Add / Edit Product Form -->
    <div>
      <div class="admin-card">
        <div class="admin-card-title" id="product-form-title">➕ Add Product</div>

        <input type="hidden" id="edit-product-id"/>

        <div class="form-group">
          <label for="prod-name">Product Name *</label>
          <input type="text" id="prod-name" placeholder="e.g. Basmati Rice 1kg"/>
        </div>

        <div class="form-group">
          <label for="prod-desc">Description</label>
          <textarea id="prod-desc" rows="2" placeholder="Short description…"></textarea>
        </div>

        <div class="form-group">
          <label for="prod-price">Base Price (₹) *</label>
          <input type="number" id="prod-price" placeholder="99" min="0" step="0.01"/>
        </div>

        <div class="form-group">
          <label for="prod-category">Category</label>
          <select id="prod-category">
            <option value="">— Select category —</option>
          </select>
        </div>

        <!-- Image Upload -->
        <div class="form-group">
          <label for="prod-image">Product Image</label>
          <input type="file" id="prod-image" accept="image/jpeg,image/png,image/webp,image/gif"/>
          <div class="img-preview-wrap">
            <img id="img-preview" class="img-preview" style="display:none" alt="Preview"/>
          </div>
          <!-- progress bar -->
          <div class="upload-bar-wrap" id="upload-bar-wrap">
            <div class="upload-bar" id="upload-bar"></div>
          </div>
          <input type="hidden" id="existing-image-url"/>
          <small style="color:#9A9A9A;font-size:.75rem;margin-top:.25rem;display:block">
            JPG / PNG / WebP · Max 5 MB · Stored in Supabase Storage
          </small>
        </div>

        <!-- Variants -->
        <div class="variants-area">
          <div class="variants-area-head">
            <label>Variants (optional)</label>
            <button class="add-variant-btn" id="add-variant-btn" type="button">+ Add</button>
          </div>
          <div id="variants-list"></div>
          <small style="color:#9A9A9A;font-size:.75rem">e.g. Name: 500g · Price: 49</small>
        </div>

        <div style="display:flex;gap:.7rem;margin-top:.5rem">
          <button class="btn btn-primary btn-full" id="save-product-btn">💾 Save Product</button>
          <button class="btn btn-ghost" id="cancel-edit-btn" style="display:none">✕ Cancel</button>
        </div>

        <div class="form-status" id="product-form-status" style="display:none"></div>
      </div>
    </div>

    <!-- RIGHT: Product List -->
    <div>
      <div class="admin-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <div class="admin-card-title" style="margin-bottom:0">📦 Products</div>
          <span class="count-badge" id="product-list-count">0</span>
        </div>
        <div id="product-list-loading" class="spinner-wrap"><div class="spinner"></div></div>
        <div id="product-list-container"></div>
      </div>
    </div>
  </div>

  <!-- ── CATEGORIES TAB ────────────────────────────── -->
  <div id="tab-categories" class="admin-wrap" style="display:none">

    <!-- LEFT: Add / Edit Category -->
    <div>
      <div class="admin-card">
        <div class="admin-card-title">🗂 Manage Categories</div>

        <div class="form-group">
          <label for="cat-name-input">Category Name *</label>
          <input type="text" id="cat-name-input" placeholder="e.g. Dairy Products"/>
        </div>
        <button class="btn btn-primary btn-full" id="add-category-btn">➕ Add Category</button>
        <div class="form-status" id="category-form-status" style="display:none"></div>
      </div>
    </div>

    <!-- RIGHT: Category List -->
    <div>
      <div class="admin-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <div class="admin-card-title" style="margin-bottom:0">📋 All Categories</div>
          <span class="count-badge" id="category-list-count">0</span>
        </div>
        <div id="category-list-loading" class="spinner-wrap"><div class="spinner"></div></div>
        <div id="category-list-container"></div>
      </div>
    </div>
  </div>

</div><!-- end #admin-panel -->

<!-- ════════════════════════════════════════════════════
     CONFIRM DELETE MODAL
════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="confirm-modal" style="display:none" role="dialog" aria-modal="true">
  <div class="modal-box confirm-box">
    <h2>⚠️ Delete?</h2>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="confirm-cancel-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">🗑️ Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="admin-toast" role="status" aria-live="polite"></div>

<script src="supabase.js"></script>
<script src="admin.js"></script>
</body>
</html>
